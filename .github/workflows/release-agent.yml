name: Release Agent

on:
  push:
    tags:
      - 'agent-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.1)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build installer (NSIS oneClick)
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Estate-OS-Agent-Windows
          path: agent/release/Estate-OS-Agent-Setup.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Estate-OS Agent ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: agent/release/Estate-OS-Agent-Setup.exe
          body: |
            ## Estate-OS Agent 자동 설치 프로그램

            **설치 방법:** `Estate-OS-Agent-Setup.exe` 를 다운로드 후 실행하면 자동으로 설치됩니다.

            - 설치 위치: `%LOCALAPPDATA%\Programs\estate-os-agent`
            - Windows 시작 시 자동 실행 (트레이 상주)
            - 포트: 47328 (localhost only)
